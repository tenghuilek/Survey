<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leadership &amp; Career Survey</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
 --ink: #0d0d0d;
 --cream: #121212;
 --gold: #e0187a;
 --gold-light: #ff5aaa;
 --soft: #2a2a2a;
 --muted: #888888;
 --error: #ff4444;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0d0d0d; color: #f0f0f0; font-family: 'DM Sans', sans-serif; min-height: 100vh; padding: 0 0 60px; }

  /* Hero */
  .hero { background: var(--ink); padding: 40px 24px 32px; position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: -60px; right: -60px; width: 200px; height: 200px; border-radius: 50%; background: radial-gradient(circle, rgba(224,24,122,0.25) 0%, transparent 70%); }
  .badge { display: inline-block; background: var(--gold); color: #fff; font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; padding: 5px 12px; border-radius: 2px; margin-bottom: 16px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 28px; line-height: 1.25; color: #fff; margin-bottom: 10px; }
  .hero h1 span { color: var(--gold-light); }
  .hero p { font-size: 13px; color: rgba(255,255,255,0.55); line-height: 1.6; max-width: 320px; }

  /* Form body */
  .form-body { padding: 28px 20px; display: flex; flex-direction: column; gap: 24px; }

  /* Q blocks */
  .q-block { opacity: 0; transform: translateY(16px); animation: fadeUp 0.4s ease forwards; }
  .q-block:nth-child(1)  { animation-delay: 0.05s; } .q-block:nth-child(2)  { animation-delay: 0.10s; }
  .q-block:nth-child(3)  { animation-delay: 0.15s; } .q-block:nth-child(4)  { animation-delay: 0.20s; }
  .q-block:nth-child(5)  { animation-delay: 0.25s; } .q-block:nth-child(6)  { animation-delay: 0.30s; }
  .q-block:nth-child(7)  { animation-delay: 0.35s; } .q-block:nth-child(8)  { animation-delay: 0.40s; }
  .q-block:nth-child(9)  { animation-delay: 0.45s; } .q-block:nth-child(10) { animation-delay: 0.50s; }
  .q-block:nth-child(11) { animation-delay: 0.55s; } .q-block:nth-child(12) { animation-delay: 0.60s; }
  .q-block:nth-child(13) { animation-delay: 0.65s; } .q-block:nth-child(14) { animation-delay: 0.70s; }
  @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

  .q-label { font-size: 11px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--gold); margin-bottom: 8px; }
  .q-text { font-family: 'Playfair Display', serif; font-size: 17px; color: #f0f0f0; line-height: 1.4; margin-bottom: 14px; }
  .q-sub { font-size: 12px; color: #888; margin-top: -10px; margin-bottom: 14px; line-height: 1.5; }

  /* Pills */
  .pill-group { display: flex; flex-wrap: wrap; gap: 8px; }
  .pill { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border: 1.5px solid var(--soft); border-radius: 100px; font-size: 13px; color: #ccc; cursor: pointer; transition: all 0.2s; background: #1a1a1a; user-select: none; }
  .pill input { display: none; }
  .pill:hover { border-color: var(--gold); color: #ffffff !important; background: #2a2a2a; }
  .pill.selected { background: var(--gold); border-color: var(--gold); color: #fff; }

  /* Scale */
  .scale-row { display: flex; gap: 6px; }
  .scale-btn { flex: 1; aspect-ratio: 1; border: 1.5px solid var(--soft); background: #1a1a1a; border-radius: 8px; font-size: 14px; font-weight: 500; color: var(--muted); cursor: pointer; transition: all 0.18s; display: flex; align-items: center; justify-content: center; }
  .scale-btn:hover { border-color: var(--gold); color: #ffffff !important; background: #2a2a2a; }
  .scale-btn.selected { background: var(--gold); border-color: var(--gold); color: #fff; }
  .scale-labels { display: flex; justify-content: space-between; margin-top: 6px; font-size: 10px; color: var(--muted); }

  /* Text inputs */
  .text-input { width: 100%; padding: 13px 16px; border: 1.5px solid var(--soft); border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 14px; color: #f0f0f0; background: #1a1a1a; outline: none; transition: border-color 0.2s; }
  .text-input:focus { border-color: var(--gold); }
  .input-row { display: flex; flex-direction: column; gap: 16px; }
  .input-field { display: flex; flex-direction: column; gap: 6px; }
  .input-label { font-size: 12px; font-weight: 500; color: #888; }

  /* Section header */
  .section-header { padding: 8px 0 4px; }
  .section-label { font-size: 11px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .section-sub { font-size: 12px; color: #888; line-height: 1.5; }

  /* Nudge blocks */
  .nudge-block { display: flex; gap: 12px; align-items: flex-start; background: linear-gradient(135deg, rgba(224,24,122,0.07), rgba(0,0,0,0.3)); border: 1px solid rgba(224,24,122,0.25); border-radius: 12px; padding: 16px; }
  .nudge-close { justify-content: center; background: linear-gradient(135deg, rgba(224,24,122,0.12), rgba(0,0,0,0.2)); border-color: rgba(224,24,122,0.4); }
  .nudge-icon { font-size: 20px; flex-shrink: 0; line-height: 1.4; }
  .nudge-text { font-size: 13px; color: #d0d0d0; line-height: 1.65; }
  .nudge-text strong { font-weight: 500; color: #f0f0f0; }
  .nudge-text em { font-style: italic; color: var(--muted); }

  /* Reveal */
  .reveal-block { margin-top: 12px; padding: 12px 14px; border-radius: 8px; background: rgba(224,24,122,0.08); border-left: 3px solid var(--gold); font-size: 13px; color: #e0e0e0; line-height: 1.6; animation: fadeUp 0.3s ease forwards; }

  /* Divider */
  .divider { height: 1px; background: #222; margin: 4px 0; }

  /* Validation */
  .q-block.error .q-text  { color: var(--error); }
  .q-block.error .q-label { color: var(--error); }
  .q-block.error .pill { border-color: rgba(192,57,43,0.35); }
  .input-field.error .text-input  { border-color: var(--error); }
  .input-field.error .input-label { color: var(--error); }
  .error-msg { font-size: 11px; color: var(--error); margin-top: 8px; display: flex; align-items: center; gap: 5px; }
  .error-msg::before { content: '!'; display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; background: var(--error); color: #fff; font-size: 9px; font-weight: 700; flex-shrink: 0; }

  /* Submit */
  .submit-btn { width: 100%; padding: 16px; background: var(--gold); color: #fff; border: none; border-radius: 12px; font-family: 'Playfair Display', serif; font-size: 17px; cursor: pointer; transition: all 0.2s; }
  .submit-btn:hover { background: #c01468; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,13,13,0.2); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
  .footer-note { text-align: center; font-size: 11px; color: #666; margin-top: 16px; line-height: 1.6; padding: 0 12px; }

  /* Thank you */
  .thankyou { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; padding: 40px 24px; text-align: center; }
  .thankyou.show { display: flex; }
  .check-circle { width: 72px; height: 72px; border-radius: 50%; background: var(--gold); display: flex; align-items: center; justify-content: center; margin-bottom: 24px; animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1); }
  @keyframes popIn { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .check-circle svg { width: 32px; height: 32px; }
  .thankyou h2 { font-family: 'Playfair Display', serif; font-size: 26px; color: #f0f0f0; margin-bottom: 12px; }
  .thankyou p { font-size: 14px; color: #aaa; line-height: 1.7; max-width: 280px; }
  .gold-tag { display: inline-block; margin-top: 24px; padding: 8px 20px; background: var(--gold); color: #fff; border-radius: 100px; font-size: 12px; font-weight: 500; letter-spacing: 1px; }
</style>

<script>
// ── Render CONFIG into DOM ────────────────────────────────────────────────────

function renderConfig() {
  const C = CONFIG;

  // Hero
  document.getElementById('heroTitle').innerHTML = C.hero.title + '<br><span>' + C.hero.titleSpan + '</span>';
  document.getElementById('heroSubtitle').textContent = C.hero.subtitle;

  // Nudges
  document.getElementById('nudge-recruitment').innerHTML  = '<strong>Did you know?</strong> ' + C.nudges.recruitment.replace('Did you know? ','');
  document.getElementById('nudge-closing').innerHTML = C.nudges.closing;

  // Section headers
  document.getElementById('section-adulting-label').textContent = C.sections.adulting.label;

  // Submit & footer
  document.getElementById('submitBtn').innerHTML = C.submit.buttonText;
  document.getElementById('footerNote').textContent = C.submit.footerNote;

  // Thank you
  document.getElementById('ty-heading').textContent = C.thankyou.heading;
  document.getElementById('ty-body').textContent = C.thankyou.body;
  document.getElementById('ty-name').textContent = C.thankyou.name;
  document.getElementById('ty-role').textContent = C.thankyou.role;

  // Questions
  const qs = C.questions;
  renderQuestion('q1', qs.q1,  'pills-q1');
  renderQuestion('q2', qs.q2,  'pills-q2');
  renderScale(qs.q3);
  renderQuestion('q4', qs.q4,  'pills-q4');
  renderQuestion('q5', qs.q5,  'pills-q5');
  renderQuestion('q6', qs.q6,  'pills-q6');
  renderQuestion('q_internship_open', qs.q_internship_open, 'pills-q_internship_open');
  renderQuestion('q11', qs.q11, 'pills-q11');
  renderQuestion('q_bto_interest', qs.q_bto_interest, 'pills-q_bto_interest');
  renderQuestion('q10', qs.q10, 'pills-q10');
  renderQuestion('q14', qs.q14, 'pills-q14');

  // Q15 contact fields
  document.getElementById('text-q15').textContent = qs.q15.text;
  document.getElementById('fieldLabel-name').textContent = qs.q15.fieldName.label;
  document.getElementById('inputName').placeholder = qs.q15.fieldName.placeholder;
  document.getElementById('fieldLabel-phone').textContent  = qs.q15.fieldPhone.label;
  document.getElementById('inputPhone').placeholder = qs.q15.fieldPhone.placeholder;
  document.getElementById('fieldLabel-faculty').textContent= qs.q15.fieldFaculty.label;
  document.getElementById('inputFaculty').placeholder = qs.q15.fieldFaculty.placeholder;
}

function renderQuestion(qKey, qData, pillsId) {
  document.getElementById('label-' + qKey).textContent = qData.label;
  document.getElementById('text-'  + qKey).textContent = qData.text;
  if (qData.sub && document.getElementById('sub-' + qKey)) {
 document.getElementById('sub-' + qKey).textContent = qData.sub;
  }
  if (qData.options) {
 const container = document.getElementById(pillsId);
 qData.options.forEach(opt => {
 const label = document.createElement('label');
 label.className = 'pill';
 const input = document.createElement('input');
 input.type  = 'radio';
 input.name  = container.dataset.name;
 input.value = opt.value;
 label.appendChild(input);
 label.appendChild(document.createTextNode(opt.label));
 container.appendChild(label);
 });
  }
}

function renderScale(qData) {
  document.getElementById('label-q3').textContent = qData.label;
  document.getElementById('text-q3').textContent  = qData.text;
  document.getElementById('scaleMin').textContent = qData.scaleMin;
  document.getElementById('scaleMax').textContent = qData.scaleMax;
  const scale = document.getElementById('scale3');
  for (let i = 1; i <= 5; i++) {
 const btn = document.createElement('button');
 btn.className = 'scale-btn';
 btn.textContent = i;
 btn.dataset.val = i;
 btn.onclick = () => {
 document.querySelectorAll('#scale3 .scale-btn').forEach(b => b.classList.remove('selected'));
 btn.classList.add('selected');
 const block = btn.closest('.q-block');
 if (block) { block.classList.remove('error'); const m = block.querySelector('.error-msg'); if (m) m.remove(); }
 };
 scale.appendChild(btn);
  }
}

// ── Pill interactions ─────────────────────────────────────────────────────────

function attachPillListeners() {
  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', function(e) {
      e.preventDefault();
      const group = this.closest('.pill-group');
      if (!group) return;
      const input = this.querySelector('input');

      // Deselect all in group, select this one
      group.querySelectorAll('.pill').forEach(p => {
        p.classList.remove('selected');
        const inp = p.querySelector('input');
        if (inp) inp.checked = false;
      });
      this.classList.add('selected');
      if (input) input.checked = true;

      // Clear validation error
      const block = group.closest('.q-block');
      if (block) {
        block.classList.remove('error');
        const m = block.querySelector('.error-msg');
        if (m) m.remove();
      }
    });
  });

  document.querySelectorAll('.text-input').forEach(input => {
    input.addEventListener('input', function() {
      const f = this.closest('.input-field');
      if (f) {
        f.classList.remove('error');
        const m = f.querySelector('.error-msg');
        if (m) m.remove();
      }
    });
  });
}

// ── Helpers ───────────────────────────────────────────────────────────────────

const getSelected = n => { const e = document.querySelector('.pill.selected input[name="'+n+'"]'); return e ? e.value : ''; };
const getScale = () => { const s = document.querySelector('#scale3 .scale-btn.selected'); return s ? s.dataset.val : ''; };

function clearErrors() {
  document.querySelectorAll('.q-block.error, .input-field.error').forEach(e => e.classList.remove('error'));
  document.querySelectorAll('.error-msg').forEach(e => e.remove());
}

function flagBlock(block, msg, after) {
  block.classList.add('error');
  if (!block.querySelector('.error-msg')) {
 const e = document.createElement('div'); e.className = 'error-msg'; e.textContent = msg; after.after(e);
  }
}

function flagInput(field, msg) {
  field.classList.add('error');
  if (!field.querySelector('.error-msg')) {
 const e = document.createElement('div'); e.className = 'error-msg'; e.textContent = msg; field.appendChild(e);
  }
}

// ── Submit ────────────────────────────────────────────────────────────────────

async function submitForm() {
  clearErrors();
  let first = null, err = false;
  const ERR = CONFIG.errors;

  const check = (name, msg) => {
 const g = document.querySelector('[data-name="'+name+'"]');
 if (!g) return;
 const ok = !!g.querySelector('.pill.selected');
 if (!ok) {
 const b = g.closest('.q-block');
 flagBlock(b, msg, g);
 if (!first) first = b;
 err = true;
 }
  };

  check('year', ERR.year);
  check('advisory', ERR.advisory);
  check('fa_income', ERR.fa_income);
  check('agency_feel', ERR.agency_feel);
  check('bto_interest', ERR.bto_interest || 'Please pick an option.');
  check('gap_topic', ERR.gap_topic);
  check('internship_plans',ERR.internship_plans);
  check('internship_open', ERR.internship_open || 'Please pick an option.');
  check('invest_curious', ERR.invest_curious);
  check('first_paycheck', ERR.first_paycheck);

  if (!getScale()) {
 const b = document.querySelector('#scale3').closest('.q-block');
 flagBlock(b, ERR.scale, document.querySelector('#scale3'));
 if (!first) first = b; err = true;
  }

  if (!document.getElementById('inputName').value.trim()) {
 const f = document.getElementById('inputName').closest('.input-field');
 flagInput(f, ERR.name);
 if (!first) first = f; err = true;
  }

  if (err) { first.scrollIntoView({ behavior: 'smooth', block: 'center' }); return; }

  const btn = document.getElementById('submitBtn');
  btn.textContent = 'Submitting...'; btn.disabled = true;

  const payload = {
 name: document.getElementById('inputName').value.trim(),
 phone: document.getElementById('inputPhone').value.trim(),
 faculty: document.getElementById('inputFaculty').value.trim(),
 year: getSelected('year'),
 scale: getScale(),
 advisory: getSelected('advisory'),
 fa_income: getSelected('fa_income'),
 agency_feel: getSelected('agency_feel'),
 gap_topic: getSelected('gap_topic'),
 internship_plans: getSelected('internship_plans'),
 internship_open:  getSelected('internship_open'),
 invest_curious: getSelected('invest_curious'),
 first_paycheck: getSelected('first_paycheck')
  };

  try {
 await fetch(CONFIG.appsScriptUrl, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
  } catch(e) { console.log('Submitted', e); }

  document.getElementById('formBody').style.display = 'none';
  document.getElementById('thankYou').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Init ──────────────────────────────────────────────────────────────────────

renderConfig();
attachPillListeners();
</script>
